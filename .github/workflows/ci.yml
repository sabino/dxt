name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"
  DUCKDB_VERSION: "1.4.2"
  DUCKDB_CLI_SHA256: "fae3ba93eedf20b08bca4b23aeac1ba94c446f1c10d029c193e2fc4b4e0bc1bc"
  JAFFLE_SHOP_DUCKDB_REPO: "https://github.com/dbt-labs/jaffle_shop_duckdb.git"
  JAFFLE_SHOP_DUCKDB_REF: "36bde6cba69d962b83be1d52fc65a0dce1cb4ebb"

jobs:
  native:
    name: native zig and safety
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Print tool versions
        run: |
          zig version
          python --version

      - name: Check whitespace
        run: git show --check --format=short --no-renames HEAD

      - name: Check Zig formatting
        run: |
          zig fmt --check build.zig build.zig.zon
          find src -name '*.zig' -print0 | sort -z | xargs -0 zig fmt --check

      - name: Run public-safety scan
        run: python scripts/check_public_safety.py

      - name: Check runtime boundary
        run: python scripts/check_runtime_boundary.py

      - name: Build Zig binary
        run: zig build --summary all

      - name: Run Zig tests
        run: zig build test --summary all

      - name: Build release-safe binary
        run: zig build -Doptimize=ReleaseSafe --summary all

  integration:
    name: test py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Print tool versions
        run: |
          zig version
          python --version

      - name: Run tests
        run: pytest -q --junitxml=reports/pytest-${{ matrix.python-version }}.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: reports/pytest-${{ matrix.python-version }}.xml
          if-no-files-found: ignore

  public-fixtures:
    # Keep this context name stable for branch protection; the job now runs
    # public Jaffle parse, ls, compile, DuckDB build/run, and docs-generate gates.
    name: public jaffle parse gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Fetch public Jaffle fixture
        run: |
          git clone "${JAFFLE_SHOP_DUCKDB_REPO}" "$RUNNER_TEMP/jaffle_shop_duckdb"
          git -C "$RUNNER_TEMP/jaffle_shop_duckdb" checkout "${JAFFLE_SHOP_DUCKDB_REF}"
          git -C "$RUNNER_TEMP/jaffle_shop_duckdb" rev-parse HEAD

      - name: Run public Jaffle parse gate
        run: python scripts/check_jaffle_shop_duckdb_parse.py --project-dir "$RUNNER_TEMP/jaffle_shop_duckdb"

      - name: Run public Jaffle ls gate
        run: python scripts/check_jaffle_shop_duckdb_ls.py --no-build --project-dir "$RUNNER_TEMP/jaffle_shop_duckdb"

      - name: Run public Jaffle compile gate
        run: python scripts/check_jaffle_shop_duckdb_compile.py --no-build --project-dir "$RUNNER_TEMP/jaffle_shop_duckdb"

      - name: Install DuckDB CLI
        run: |
          mkdir -p "$RUNNER_TEMP/duckdb"
          curl --fail --location --show-error \
            --output "$RUNNER_TEMP/duckdb_cli.zip" \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          echo "${DUCKDB_CLI_SHA256}  $RUNNER_TEMP/duckdb_cli.zip" | sha256sum --check -
          unzip -q "$RUNNER_TEMP/duckdb_cli.zip" -d "$RUNNER_TEMP/duckdb"
          chmod +x "$RUNNER_TEMP/duckdb/duckdb"
          echo "$RUNNER_TEMP/duckdb" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/duckdb/duckdb" --version

      - name: Run public Jaffle build gate
        run: python scripts/check_jaffle_shop_duckdb_build.py --no-build --project-dir "$RUNNER_TEMP/jaffle_shop_duckdb"

      - name: Run public Jaffle run gate
        run: python scripts/check_jaffle_shop_duckdb_run.py --no-build --project-dir "$RUNNER_TEMP/jaffle_shop_duckdb"

      - name: Run public Jaffle docs gate
        run: python scripts/check_jaffle_shop_duckdb_docs.py --no-build --project-dir "$RUNNER_TEMP/jaffle_shop_duckdb"
