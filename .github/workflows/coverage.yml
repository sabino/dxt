name: Coverage

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "build.zig"
      - "build.zig.zon"
      - "src/**"
      - "scripts/native_zig_test_coverage_map.py"
      - ".github/workflows/coverage.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"

jobs:
  native-zig:
    name: native Zig coverage map
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Run native tests
        run: zig build test --summary all

      - name: Build standalone Zig test binary
        run: |
          mkdir -p reports/bin
          zig test src/root.zig \
            --test-no-exec \
            -femit-bin=reports/bin/dxt-zig-tests \
            --cache-dir "$RUNNER_TEMP/zig-cache" \
            --global-cache-dir "$RUNNER_TEMP/zig-global-cache"

      - name: Generate native test coverage map
        run: |
          python scripts/native_zig_test_coverage_map.py --src src --out reports/coverage

      - name: Summarize coverage artifact
        if: always()
        run: |
          cat reports/coverage/native-zig-test-map.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload native coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-zig-coverage-map-${{ github.sha }}
          path: reports/coverage
          if-no-files-found: error
          retention-days: 14
