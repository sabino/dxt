version: 2

macros:
  - name: patched_macro
    arguments:
      - name: column_name
        type: string
        description: Column expression.
      - name: quote
        type: bool
        description: Whether to quote.
  - name: bad_macro
    arguments:
      - name: first_arg
        type: string
      - name: wrong_name
        type: list
      - name: extra_arg
        type: optional[string]
